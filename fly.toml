app = "nemoclaw-openclaw"
primary_region = "sin"  # Singapore (close to MY)

[build]
  [build.settings]
    node_bundler = "esbuild"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false  # Keep always-on
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # Keys injected via fly secrets (not here)

[mounts]
  source = "nemoclaw_data"
  destination = "/data"  # For memory/*.md persistence

[restart]
  policy = "always"